<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" role="img" aria-label="Electron movement across frames causing small reorientation of O2 molecules; similarity values shown.">

    <style> :root{ --bg:#0f1218; --text:#eaf0ff; --panel:#141824; --frame:#223047; --hole:#7c5cff33; --hole-edge:#9b8cffaa; --electron:#ffef84; --o2:#66b5ff; --link:#67e8ffaa; --arrow:#a8b4ff; } .bg{fill:var(--bg);} .panel{fill:var(--panel); stroke:var(--frame); stroke-width:2;} .label{fill:var(--text); font: 24px/1.3 ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;} .title{font-size:40px;} .hole{fill:var(--hole); stroke:var(--hole-edge); stroke-width:3;} .electron{fill:var(--electron);} .o2{fill:var(--o2);} .link{stroke:var(--link); stroke-width:2;} </style> <defs> <marker id="navArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"> <path d="M0,0 L12,6 L0,12 Z" fill="var(--arrow)"/> </marker> </defs> <rect class="bg" x="0" y="0" width="1800" height="900"/> <text x="60" y="80" class="label title">Thought Navigation by Electron Movement</text> <!-- Frame template (4 frames) --> <g transform="translate(80,140)"> <!-- Frame 1 --> <g> <rect class="panel" x="0" y="0" width="380" height="640" rx="12"/> <text class="label" x="20" y="40">Frame 1 (t=0 ms) — S0</text> <g transform="translate(190,340)"> <circle r="120" class="hole"/> <circle class="electron" r="6" cx="40" cy="-10"/> <line class="link" x1="40" y1="-10" x2="90" y2="-10"/> <line class="link" x1="40" y1="-10" x2="0" y2="-60"/> <line class="link" x1="40" y1="-10" x2="10" y2="60"/> <circle class="o2" cx="90" cy="-10" r="7"/> <circle class="o2" cx="0" cy="-60" r="7"/> <circle class="o2" cx="10" cy="60" r="7"/> <circle class="o2" cx="-70" cy="40" r="7"/> <circle class="o2" cx="-80" cy="-30" r="7"/> <circle class="o2" cx="60" cy="90" r="7"/> </g> <text class="label" x="20" y="620">Similarity baseline</text> </g>
    <!-- Arrow -->
<g transform="translate(420,320)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#a8b4ff" stroke-width="3" marker-end="url(#navArrow)"/>
    <text class="label" x="0" y="-10">Δr = (5 mm, 0, 0)</text>
  </g>
  
  <!-- Frame 2 -->
  <g transform="translate(520,0)">
    <rect class="panel" x="0" y="0" width="380" height="640" rx="12"/>
    <text class="label" x="20" y="40">Frame 2 (t=50 ms) — S1</text>
    <g transform="translate(190,340)">
      <circle r="120" class="hole"/>
      <circle class="electron" r="6" cx="55" cy="-10"/>
      <line class="link" x1="55" y1="-10" x2="100" y2="-5"/>
      <line class="link" x1="55" y1="-10" x2="10" y2="-65"/>
      <line class="link" x1="55" y1="-10" x2="20" y2="58"/>
      <circle class="o2" cx="100" cy="-5" r="7"/>
      <circle class="o2" cx="10" cy="-65" r="7"/>
      <circle class="o2" cx="20" cy="58" r="7"/>
      <circle class="o2" cx="-68" cy="40" r="7"/>
      <circle class="o2" cx="-78" cy="-30" r="7"/>
      <circle class="o2" cx="62" cy="88" r="7"/>
    </g>
    <text class="label" x="20" y="620">similarity(S0, S1) = 0.94</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(940,320)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#a8b4ff" stroke-width="3" marker-end="url(#navArrow)"/>
    <text class="label" x="0" y="-10">Δr = (0, 3 mm, 0)</text>
  </g>
  
  <!-- Frame 3 -->
  <g transform="translate(1040,0)">
    <rect class="panel" x="0" y="0" width="380" height="640" rx="12"/>
    <text class="label" x="20" y="40">Frame 3 (t=100 ms) — S2</text>
    <g transform="translate(190,340)">
      <circle r="120" class="hole"/>
      <circle class="electron" r="6" cx="55" cy="0"/>
      <line class="link" x1="55" y1="0" x2="102" y2="7"/>
      <line class="link" x1="55" y1="0" x2="12" y2="-60"/>
      <line class="link" x1="55" y1="0" x2="22" y2="65"/>
      <circle class="o2" cx="102" cy="7" r="7"/>
      <circle class="o2" cx="12" cy="-60" r="7"/>
      <circle class="o2" cx="22" cy="65" r="7"/>
      <circle class="o2" cx="-66" cy="38" r="7"/>
      <circle class="o2" cx="-76" cy="-28" r="7"/>
      <circle class="o2" cx="64" cy="90" r="7"/>
    </g>
    <text class="label" x="20" y="620">similarity(S1, S2) = 0.93</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(1460,320)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#a8b4ff" stroke-width="3" marker-end="url(#navArrow)"/>
    <text class="label" x="0" y="-10">Δr = (0, 0, 3 mm)</text>
  </g>
  
  <!-- Frame 4 (path) -->
  <g transform="translate(1560,0)">
    <rect class="panel" x="0" y="0" width="160" height="640" rx="12"/>
    <text class="label" x="12" y="40">Path</text>
    <g transform="translate(80,330)">
      <polyline fill="none" stroke="#67e8ff" stroke-width="3" points="-50,-20 -20,-10 0,0 10,14"/>
      <circle r="4" cx="-50" cy="-20" fill="#67e8ff"/>
      <circle r="4" cx="-20" cy="-10" fill="#67e8ff"/>
      <circle r="4" cx="0" cy="0" fill="#67e8ff"/>
      <circle r="4" cx="10" cy="14" fill="#67e8ff"/>
    </g>
  </g>
</g> </svg>  