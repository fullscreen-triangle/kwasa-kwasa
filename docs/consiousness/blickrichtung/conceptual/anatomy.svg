<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Anatomy of a single thought: O2 molecules around an oscillatory hole with a stabilizing electron near boundary, with annotations.">

    <style> :root{ --bg:#101218; --grid:#2a2f3a; --o2:#5aa7ff; --o2-bright:#8cc4ff; --hole:#7c5cff55; --hole-edge:#9b8cff55; --electron:#ffec7a; --electron-glow:rgba(255,236,122,0.55); --lines:#55e0ff99; --text:#e8eef9; --accent:#9be8ff; --axis:#cbd3ff55; } .bg{fill:var(--bg);} .label{fill:var(--text); font: 28px/1.3 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;} .small{font-size:22px;} .axis{stroke:var(--axis); stroke-width:2; marker-end:url(#arrow);} .grid{stroke:var(--grid); stroke-width:1;} .o2{fill:var(--o2); opacity:0.95;} .o2-bright{fill:var(--o2-bright);} .hole-glow{fill:url(#holeRadial);} .hole-edge{stroke:var(--hole-edge); stroke-width:3; fill:none;} .electron{fill:var(--electron); filter:url(#glow);} .link{stroke:var(--lines); stroke-width:2; fill:none;} .annotation-line{stroke:var(--accent); stroke-width:2; stroke-dasharray:6 6;} .annotation-dot{fill:var(--accent);} .panel{fill:#141824; stroke:#223047; stroke-width:2;} .metric{fill:var(--text); font: 24px/1.2 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;} </style> <defs> <radialGradient id="holeRadial" cx="50%" cy="50%" r="50%"> <stop offset="0%" stop-color="#7c5cff22"/> <stop offset="70%" stop-color="#7c5cff33"/> <stop offset="100%" stop-color="#7c5cff00"/> </radialGradient> <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"> <feGaussianBlur stdDeviation="6" result="b"/> <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge> </filter> <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"> <path d="M0,0 L10,5 L0,10 Z" fill="var(--axis)"/> </marker> </defs> <rect class="bg" x="0" y="0" width="1600" height="1000"/> <!-- Subtle perspective grid --> <g opacity="0.5" transform="translate(800,520) skewX(-12)"> <g> <!-- verticals --> <g transform="translate(-800,0)"> <path class="grid" d="M100,0 V420"/> <path class="grid" d="M300,0 V420"/> <path class="grid" d="M500,0 V420"/> <path class="grid" d="M700,0 V420"/> <path class="grid" d="M900,0 V420"/> <path class="grid" d="M1100,0 V420"/> <path class="grid" d="M1300,0 V420"/> <path class="grid" d="M1500,0 V420"/> </g> <!-- horizontals --> <g transform="translate(-800,0)"> <path class="grid" d="M0,40 H1600"/> <path class="grid" d="M0,120 H1600"/> <path class="grid" d="M0,200 H1600"/> <path class="grid" d="M0,280 H1600"/> <path class="grid" d="M0,360 H1600"/> </g> </g> </g> <!-- Coordinate axes --> <g transform="translate(800,500)"> <line class="axis" x1="0" y1="0" x2="300" y2="0"/> <line class="axis" x1="0" y1="0" x2="0" y2="-240"/> <line class="axis" x1="0" y1="0" x2="-180" y2="200"/> <text class="label small" x="310" y="10">+X (cm)</text> <text class="label small" x="-18" y="-250">+Y (cm)</text> <text class="label small" x="-210" y="220">+Z (cm)</text> </g> <!-- Hole volume (translucent) --> <g transform="translate(800,500)"> <!-- Outer shell radius ~ 7.5 cm mapped to ~240 px --> <circle r="180" class="hole-glow"/> <circle r="150" class="hole-edge"/> <circle r="90" class="hole-edge" stroke-dasharray="4 8"/> <!-- Labels for layers --> <text class="label small" x="0" y="8" text-anchor="middle">Oscillatory Hole</text> </g> <!-- O2 molecules (40-60), nearer to center slightly larger/brighter --> <g id="o2-group"> <!-- Coordinates hand-picked for depth; z approximated by size/brightness --> <!-- function: draw(x,y,depth) --> <g opacity="0.95"> <!-- nearer (brighter, larger) --> <circle class="o2 o2-bright" cx="990" cy="455" r="10"/> <circle class="o2 o2-bright" cx="700" cy="430" r="9"/> <circle class="o2 o2-bright" cx="880" cy="610" r="10"/> <circle class="o2 o2-bright" cx="750" cy="560" r="9.5"/> <circle class="o2 o2-bright" cx="915" cy="365" r="9"/> <circle class="o2 o2-bright" cx="1060" cy="540" r="10"/> <circle class="o2 o2-bright" cx="675" cy="495" r="9"/> <!-- mid --> <circle class="o2" cx="1040" cy="470" r="7.5"/> <circle class="o2" cx="920" cy="520" r="7.5"/> <circle class="o2" cx="860" cy="420" r="7"/> <circle class="o2" cx="780" cy="380" r="7"/> <circle class="o2" cx="700" cy="640" r="7"/> <circle class="o2" cx="965" cy="680" r="7.5"/> <circle class="o2" cx="1120" cy="600" r="7"/> <circle class="o2" cx="620" cy="520" r="7"/> <circle class="o2" cx="840" cy="690" r="7"/> <circle class="o2" cx="740" cy="320" r="7"/> <circle class="o2" cx="980" cy="320" r="7"/> <circle class="o2" cx="600" cy="420" r="7"/> <circle class="o2" cx="1160" cy="450" r="7"/> <circle class="o2" cx="1080" cy="360" r="7"/> <circle class="o2" cx="880" cy="310" r="7"/> <!-- far (smaller, dimmer but still visible) --> <circle class="o2" cx="540" cy="580" r="5.5" opacity="0.85"/> <circle class="o2" cx="1200" cy="520" r="5.5" opacity="0.85"/> <circle class="o2" cx="680" cy="720" r="5.5" opacity="0.85"/> <circle class="o2" cx="1040" cy="740" r="5.5" opacity="0.85"/> <circle class="o2" cx="560" cy="340" r="5.5" opacity="0.85"/> <circle class="o2" cx="1240" cy="380" r="5.5" opacity="0.85"/> <circle class="o2" cx="920" cy="780" r="5.5" opacity="0.85"/> <circle class="o2" cx="820" cy="760" r="5.5" opacity="0.85"/> <circle class="o2" cx="1260" cy="640" r="5.5" opacity="0.85"/> <circle class="o2" cx="560" cy="700" r="5.5" opacity="0.85"/> <circle class="o2" cx="640" cy="260" r="5.5" opacity="0.85"/> <circle class="o2" cx="1120" cy="270" r="5.5" opacity="0.85"/> <circle class="o2" cx="920" cy="240" r="5.5" opacity="0.85"/> <circle class="o2" cx="1260" cy="300" r="5.5" opacity="0.85"/> <circle class="o2" cx="520" cy="250" r="5.5" opacity="0.85"/> </g> </g> <!-- Electron near inner boundary --> <g id="electron"> <line class="link" x1="940" y1="455" x2="990" y2="455"/> <line class="link" x1="940" y1="455" x2="915" y2="365"/> <line class="link" x1="940" y1="455" x2="920" y2="520"/> <line class="link" x1="940" y1="455" x2="880" y2="420"/> <line class="link" x1="940" y1="455" x2="980" y2="320"/> <circle class="electron" cx="940" cy="455" r="6"/> <circle cx="940" cy="455" r="18" fill="var(--electron-glow)"/> </g> <!-- Title -->
    <text x="70" y="90" class="label" font-size="40">Anatomy of a Single Thought</text>
    <text x="70" y="130" class="label small">O₂ molecules around an oscillatory hole with electron stabilization</text>
    
    <!-- Annotations panel --> <g transform="translate(1120,110)"> <rect class="panel" x="0" y="0" width="420" height="250" rx="10"/> <text class="metric" x="24" y="50">Hole diameter ≈ 5 cm</text> <text class="metric" x="24" y="90">N (O₂) = 48</text> <text class="metric" x="24" y="130">Electron energy E = 247 eV</text> <text class="metric" x="24" y="170">Current I = 450 pA</text> <text class="metric" x="24" y="210">Active region ±10 cm</text> </g> <!-- Callouts --> <g> <circle class="annotation-dot" cx="800" cy="500" r="5"/> <path class="annotation-line" d="M800,500 C780,400 640,340 520,320"/> <text class="label small" x="480" y="310">Hole center (origin)</text>
        <circle class="annotation-dot" cx="940" cy="455" r="5"/>
<path class="annotation-line" d="M940,455 C1050,430 1220,350 1260,250"/>
<text class="label small" x="1260" y="240">Electron near inner boundary</text>
</g> </svg>