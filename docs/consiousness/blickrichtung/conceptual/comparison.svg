<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900" role="img" aria-label="Side-by-side comparison of two similar thoughts with color-coded molecule similarity and similarity score.">

    <style> :root{ --bg:#0f1218; --panel:#141824; --frame:#223047; --text:#eaf0ff; --o2:#66b5ff; --same:#56f39a; --slight:#ffd86b; --diff:#ff6b6b; --hole:#7c5cff33; --hole-edge:#9b8cffaa; --electron:#ffef84; } .bg{fill:var(--bg);} .panel{fill:var(--panel); stroke:var(--frame); stroke-width:2;} .label{fill:var(--text); font: 26px/1.3 ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;} .title{font-size:40px;} .hole{fill:var(--hole); stroke:var(--hole-edge); stroke-width:3;} .o2{fill:var(--o2);} </style> <rect class="bg" x="0" y="0" width="1800" height="900"/> <text x="60" y="80" class="label title">Thought Comparison: Vanillin vs. Ethyl Vanillin</text> <text x="60" y="120" class="label">Geometric similarity = 0.89</text> <!-- Panels --> <g transform="translate(80,160)"> <rect class="panel" x="0" y="0" width="800" height="680" rx="14"/> <text class="label" x="30" y="50">Thought A: Vanillin</text> <g transform="translate(400,360)"> <circle r="160" class="hole"/> <circle r="6" fill="#ffef84"/> <!-- Molecules with similarity coding --> <circle cx="140" cy="-30" r="8" fill="#56f39a"/> <circle cx="110" cy="90" r="7" fill="#ffd86b"/> <circle cx="-120" cy="40" r="8" fill="#56f39a"/> <circle cx="-60" cy="-120" r="7" fill="#ffd86b"/> <circle cx="-150" cy="-20" r="7" fill="#ff6b6b"/> <circle cx="40" cy="-150" r="7" fill="#56f39a"/> <circle cx="10" cy="120" r="7" fill="#ffd86b"/> <circle cx="-20" cy="60" r="7" fill="#56f39a"/> <circle cx="90" cy="-100" r="7" fill="#ffd86b"/> <circle cx="-100" cy="-80" r="7" fill="#ff6b6b"/> </g> </g> <g transform="translate(940,160)"> <rect class="panel" x="0" y="0" width="800" height="680" rx="14"/> <text class="label" x="30" y="50">Thought B: Ethyl Vanillin</text> <g transform="translate(400,360)"> <circle r="165" class="hole"/> <circle r="6" fill="#ffef84"/> <circle cx="145" cy="-28" r="8" fill="#56f39a"/> <circle cx="118" cy="85" r="7" fill="#ffd86b"/> <circle cx="-125" cy="44" r="8" fill="#56f39a"/> <circle cx="-66" cy="-122" r="7" fill="#ffd86b"/> <circle cx="-160" cy="-30" r="7" fill="#ff6b6b"/> <circle cx="44" cy="-152" r="7" fill="#56f39a"/> <circle cx="16" cy="118" r="7" fill="#ffd86b"/> <circle cx="-24" cy="62" r="7" fill="#56f39a"/> <circle cx="94" cy="-96" r="7" fill="#ffd86b"/> <circle cx="-108" cy="-86" r="7" fill="#ff6b6b"/> </g> </g> <!-- Legend --> <g transform="translate(60,820)"> <circle cx="0" cy="0" r="8" fill="#56f39a"/> <text class="label" x="20" y="8">Green = same position (high overlap)</text> <circle cx="420" cy="0" r="8" fill="#ffd86b"/> <text class="label" x="440" y="8">Yellow = slight difference</text> <circle cx="770" cy="0" r="8" fill="#ff6b6b"/> <text class="label" x="790" y="8">Red = very different</text> </g> </svg>