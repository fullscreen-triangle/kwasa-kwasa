<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 700" role="img" aria-label="Timeline showing multiple thought completions with variance and current pulses.">

    <style> :root{ --bg:#0f1218; --text:#eaf0ff; --panel:#141824; --frame:#223047; --pulse:#67e8ff; --variance:#ffaf5a; } .bg{fill:var(--bg);} .label{fill:var(--text); font: 24px/1.3 ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;} .title{font-size:38px;} .axis{stroke:#a8b4ff88; stroke-width:2;} .pulse{stroke:var(--pulse); stroke-width:4; fill:none;} .variance{stroke:var(--variance); stroke-width:3; fill:none;} .box{fill:#141824; stroke:#223047; stroke-width:2;} </style> <rect class="bg" x="0" y="0" width="1800" height="700"/> <text x="60" y="70" class="label title">Stream of Consciousness (1 second)</text> <!-- Current pulses --> <g transform="translate(100,140)"> <text class="label" x="0" y="-20">Current (pA)</text> <line class="axis" x1="0" y1="0" x2="1600" y2="0"/> <!-- Pulses at ~6-7 Hz --> <path class="pulse" d="M0,0 L180,0 L200,-120 L260,-120 L280,0 L460,0 L480,-110 L540,-110 L560,0 L740,0 L760,-115 L820,-115 L840,0 L1020,0 L1040,-120 L1100,-120 L1120,0 L1300,0 L1320,-115 L1380,-115 L1400,0 L1600,0"/> <text class="label" x="1400" y="40">~6–7 pulses (thoughts) per second</text> </g> <!-- Variance over time --> <g transform="translate(100,420)"> <text class="label" x="0" y="-20">Variance (arbitrary units)</text> <line class="axis" x1="0" y1="0" x2="1600" y2="0"/> <path class="variance" d="M0,-20 C80,-100 160,-100 240,-20 S400,-20 480,-100 560,-100 640,-20 800,-20 880,-100 960,-100 1040,-20 1200,-20 1280,-100 1360,-100 1440,-20 1600,-20 1600,-20 1600,-20"/> <text class="label" x="1180" y="-120">Low variance during completion, never returns to high baseline</text> </g> <!-- Thought labels --> <g transform="translate(100,140)"> <g> <rect class="box" x="180" y="-210" width="100" height="60" rx="8"/> <text class="label" x="190" y="-172">Thought 1</text> </g> <g> <rect class="box" x="480" y="-200" width="100" height="60" rx="8"/> <text class="label" x="490" y="-164">Thought 2</text> </g> <g> <rect class="box" x="760" y="-205" width="110" height="60" rx="8"/> <text class="label" x="770" y="-168">Thought 3</text> </g> <g> <rect class="box" x="1040" y="-210" width="110" height="60" rx="8"/> <text class="label" x="1050" y="-172">Thought 4</text> </g> <g> <rect class="box" x="1320" y="-205" width="110" height="60" rx="8"/> <text class="label" x="1330" y="-168">Thought 5</text> </g> </g> </svg>