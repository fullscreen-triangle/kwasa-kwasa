<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-label="Cross-section of a thought showing hole, boundaries, O2 distribution, and electron with connections.">

    <style> :root{ --bg:#0f1218; --text:#edf3ff; --grid:#293245; --hole:#7c5cff33; --hole-edge:#9b8cffaa; --shell:#3bd1ff22; --o2:#66b5ff; --electron:#ffef84; --link:#67e8ffaa; } .bg{fill:var(--bg);} .label{fill:var(--text); font: 26px/1.3 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;} .title{font-size:38px;} .grid{stroke:var(--grid); stroke-width:1;} .hole{fill:var(--hole); stroke:var(--hole-edge); stroke-width:3;} .shell{fill:none; stroke:var(--shell); stroke-width:3;} .o2{fill:var(--o2);} .electron{fill:var(--electron);} .link{stroke:var(--link); stroke-width:2;} .legend rect{fill:#141824; stroke:#223047;} </style> <defs> <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"> <path d="M0,0 L10,5 L0,10 Z" fill="#cbd3ff88"/> </marker> </defs> <rect class="bg" x="0" y="0" width="1400" height="1000"/> <text x="60" y="90" class="label title">Cross-Section of a Thought (XY plane, Z=0)</text> <!-- Grid with 1–2 cm markings (abstract) --> <g transform="translate(700,520)" opacity="0.5"> <g> <!-- horizontal --> <path class="grid" d="M-560,-400 H560"/> <path class="grid" d="M-560,-320 H560"/> <path class="grid" d="M-560,-240 H560"/> <path class="grid" d="M-560,-160 H560"/> <path class="grid" d="M-560,-80 H560"/> <path class="grid" d="M-560,0 H560"/> <path class="grid" d="M-560,80 H560"/> <path class="grid" d="M-560,160 H560"/> <path class="grid" d="M-560,240 H560"/> <path class="grid" d="M-560,320 H560"/> <path class="grid" d="M-560,400 H560"/> <!-- vertical --> <path class="grid" d="M-560,-400 V400"/> <path class="grid" d="M-480,-400 V400"/> <path class="grid" d="M-400,-400 V400"/> <path class="grid" d="M-320,-400 V400"/> <path class="grid" d="M-240,-400 V400"/> <path class="grid" d="M-160,-400 V400"/> <path class="grid" d="M-80,-400 V400"/> <path class="grid" d="M0,-400 V400"/> <path class="grid" d="M80,-400 V400"/> <path class="grid" d="M160,-400 V400"/> <path class="grid" d="M240,-400 V400"/> <path class="grid" d="M320,-400 V400"/> <path class="grid" d="M400,-400 V400"/> <path class="grid" d="M480,-400 V400"/> <path class="grid" d="M560,-400 V400"/> </g> </g> <!-- Layers --> <g transform="translate(700,520)"> <circle r="260" class="shell"/> <circle r="180" class="shell"/> <circle r="120" class="hole"/> <text class="label" x="0" y="10" text-anchor="middle">Hole (low O₂ density)</text> <text class="label" x="0" y="-200" text-anchor="middle">Inner boundary</text> <text class="label" x="0" y="-280" text-anchor="middle">Outer shell (baseline O₂)</text> </g> <!-- Electron and links --> <g> <circle class="electron" cx="930" cy="520" r="6"/> <line class="link" x1="930" y1="520" x2="1010" y2="520"/> <line class="link" x1="930" y1="520" x2="860" y2="460"/> <line class="link" x1="930" y1="520" x2="860" y2="580"/> </g> <!-- O2 molecules (2D slice) --> <g> <circle class="o2" cx="880" cy="460" r="8"/> <circle class="o2" cx="870" cy="600" r="7"/> <circle class="o2" cx="1010" cy="520" r="8"/> <circle class="o2" cx="760" cy="520" r="7"/> <circle class="o2" cx="630" cy="420" r="6.5"/> <circle class="o2" cx="560" cy="520" r="6.5"/> <circle class="o2" cx="520" cy="640" r="6.5"/> <circle class="o2" cx="780" cy="360" r="6.5"/> <circle class="o2" cx="980" cy="680" r="6.5"/> <circle class="o2" cx="1140" cy="560" r="6.5"/> <circle class="o2" cx="300" cy="540" r="6.5"/> <circle class="o2" cx="1060" cy="420" r="6.5"/> <circle class="o2" cx="820" cy="700" r="6.5"/> <circle class="o2" cx="680" cy="300" r="6.5"/> <circle class="o2" cx="460" cy="440" r="6.5"/> </g> <!-- Scale and callouts --> <g> <line x1="580" y1="860" x2="820" y2="860" stroke="#cbd3ff" stroke-width="3" marker-end="url(#arrow2)"/> <text class="label" x="540" y="870">~5 cm diameter hole (not to absolute scale)</text>
        <text class="label" x="960" y="500">Electron</text>
<text class="label" x="320" y="520">Far field (baseline O₂)</text>
</g> <!-- Legend --> <g class="legend" transform="translate(1000,120)"> <rect x="0" y="0" width="330" height="160" rx="10"/> <g transform="translate(20,24)"> <circle cx="10" cy="10" r="8" fill="#66b5ff"/> <text class="label" x="40" y="18">O₂ molecule</text> <rect x="2" y="38" width="24" height="24" rx="12" fill="#7c5cff55" stroke="#9b8cffaa"/> <text class="label" x="40" y="58">Oscillatory hole</text> <circle cx="10" cy="100" r="6" fill="#ffef84"/> <text class="label" x="40" y="106">Electron + links</text> </g> </g> </svg>