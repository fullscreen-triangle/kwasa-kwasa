<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Abstract reduced 3D space of thoughts with paths and clusters.">

    <style> :root{ --bg:#0f1218; --text:#eaf0ff; --grid:#1e2534; --point:#66b5ff; --cluster:#80ffaa; --path:#ffd86b; } .bg{fill:var(--bg);} .label{fill:var(--text); font: 26px/1.3 ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;} .title{font-size:40px;} .grid{stroke:var(--grid); stroke-width:1;} </style> <rect class="bg" width="1600" height="900"/> <text x="60" y="80" class="label title">Thought Space Topology (3D reduction of 30D)</text> <!-- Pseudo-3D grid --> <g transform="translate(800,520) skewX(-16) scale(1,0.7)" opacity="0.6"> <g> <path class="grid" d="M-700,0 H700"/> <path class="grid" d="M-700,-120 H700"/> <path class="grid" d="M-700,-240 H700"/> <path class="grid" d="M-700,120 H700"/> <path class="grid" d="M-700,240 H700"/> <path class="grid" d="M-700,-360 H700"/> <path class="grid" d="M-700,360 H700"/> <path class="grid" d="M-700,-480 H700"/> <path class="grid" d="M-700,480 H700"/> </g> <g> <path class="grid" d="M-600,-500 V500"/> <path class="grid" d="M-400,-500 V500"/> <path class="grid" d="M-200,-500 V500"/> <path class="grid" d="M0,-500 V500"/> <path class="grid" d="M200,-500 V500"/> <path class="grid" d="M400,-500 V500"/> <path class="grid" d="M600,-500 V500"/> </g> </g> <!-- Clusters and points --> <g> <g fill="#80ffaa"> <circle cx="520" cy="520" r="8"/> <circle cx="560" cy="500" r="8"/> <circle cx="600" cy="540" r="8"/> <circle cx="560" cy="560" r="8"/> </g> <g fill="#66b5ff"> <circle cx="740" cy="460" r="8"/> <circle cx="780" cy="480" r="8"/> <circle cx="760" cy="520" r="8"/> <circle cx="800" cy="540" r="8"/> </g> <g fill="#66b5ff"> <circle cx="980" cy="420" r="8"/> <circle cx="1020" cy="450" r="8"/> <circle cx="1000" cy="480" r="8"/> </g> <g fill="#66b5ff"> <circle cx="1200" cy="500" r="8"/> <circle cx="1240" cy="520" r="8"/> <circle cx="1220" cy="560" r="8"/> </g>
    <!-- Path -->
<polyline fill="none" stroke="#ffd86b" stroke-width="4" points="560,560 740,520 980,480 1200,520"/>
<circle cx="560" cy="560" r="6" fill="#ffd86b"/>
<circle cx="740" cy="520" r="6" fill="#ffd86b"/>
<circle cx="980" cy="480" r="6" fill="#ffd86b"/>
<circle cx="1200" cy="520" r="6" fill="#ffd86b"/>
</g>
<text class="label" x="480" y="620">Vanillin cluster</text>
<text class="label" x="700" y="600">Vanillin-like</text>
<text class="label" x="960" y="620">Related sweet note</text>
<text class="label" x="1180" y="600">Further neighbor</text>
</svg>